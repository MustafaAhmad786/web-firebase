<!DOCTYPE html>

  <title>MyApp — Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Yeh landing page ka main wrapper hai -->
  <div class="landing-wrapper">

    <!-- Upar chhota sa badge dikhata hai -->

    <!-- Bari heading — span wala hissa colored hoga CSS se -->

    <!-- Chhoti description -->

      A complete login & registration system built with Firebase Authentication.
      Fast, secure, and easy to use.
    </p>

    <!-- Do buttons — Login aur Register ke liye -->
    <div class="landing-btns">
      <a href="login.html">
        <button class="btn btn-outline">Login</button>
      </a>
      <a href="register.html">
        <button class="btn btn-filled">Get Started →</button>
      </a>
    </div>

  </div>
